name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  # Using the GitHub variable or hardcode your image name
  IMAGE_NAME: facial-recognition-api

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only log in when pushing to primary branches (skip on typical PRs from forks)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Push to dockerhub only if on push to main (not a standard PR)
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest,${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Utilizing GitHub action cache for optimized docker builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-build-push
    # Deploy only after a successful build & push, and avoid running it on standard pull requests
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    
    steps:
      #- name: Log in to Docker Hub
      #  run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        
      - name: Stop and remove existing container
        continue-on-error: true
        run: |
          docker stop ${{ env.IMAGE_NAME }} 2>$null
          docker rm ${{ env.IMAGE_NAME }} 2>$null
          
      - name: Pull newest image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
        
      - name: Run new container
        run: docker run -d --name ${{ env.IMAGE_NAME }} -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
